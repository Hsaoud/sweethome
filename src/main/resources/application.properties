# Sweet Home Application Configuration

spring.application.name=sweethome

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/sweethome
spring.datasource.username=sweethome
spring.datasource.password=sweethome
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false

# Server
server.error.include-message=always
server.error.include-binding-errors=always
