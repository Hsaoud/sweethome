<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | Sweet Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <header class="header">
        <nav class="nav container">
            <a href="/" class="logo"><span class="logo-icon">🏠</span> Sweet Home</a>
            <ul class="nav-links">
                <li><a th:href="@{/cleaner/dashboard}">Dashboard</a></li>
                <li>
                    <form th:action="@{/logout}" method="post" style="display: inline;">
                        <button type="submit" class="btn btn-secondary btn-sm">Logout</button>
                    </form>
                </li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <div class="container" style="max-width: 700px;">
            <div class="card" style="padding: 2rem;">
                <h1 class="mb-3">Edit Your Profile</h1>

                <form th:action="@{/cleaner/profile/edit}" method="post" th:object="${cleaner}">
                    <!-- Personal Info -->
                    <h3 class="mb-2">Personal Information</h3>
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label" for="firstName">First Name</label>
                            <input type="text" id="firstName" th:field="*{firstName}" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="lastName">Last Name</label>
                            <input type="text" id="lastName" th:field="*{lastName}" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="phone">Phone Number</label>
                        <input type="tel" id="phone" th:field="*{phone}" class="form-control">
                    </div>

                    <!-- Professional Info -->
                    <h3 class="mb-2 mt-4">Professional Profile</h3>

                    <div class="form-group">
                        <label class="form-label" for="headline">Headline</label>
                        <input type="text" id="headline" th:field="*{headline}" class="form-control"
                            placeholder="e.g., Experienced House Cleaner">
                        <div class="form-text">A short tagline for your profile card</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="bio">About You</label>
                        <textarea id="bio" th:field="*{bio}" class="form-control" rows="5"
                            placeholder="Tell potential clients about your experience..."></textarea>
                    </div>

                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label" for="city">City</label>
                            <input type="text" id="city" th:field="*{city}" class="form-control">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="serviceArea">Service Area</label>
                            <input type="text" id="serviceArea" th:field="*{serviceArea}" class="form-control"
                                placeholder="e.g., Manhattan, Brooklyn">
                        </div>
                    </div>

                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label" for="hourlyRate">Hourly Rate (€)</label>
                            <input type="number" id="hourlyRate" th:field="*{hourlyRate}" class="form-control"
                                step="0.01" min="0">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="experienceYears">Years of Experience</label>
                            <input type="number" id="experienceYears" th:field="*{experienceYears}" class="form-control"
                                min="0" max="50">
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="available" th:field="*{available}">
                            <label class="form-label" for="available" style="margin-bottom: 0;">Available for
                                work</label>
                        </div>
                    </div>

                    <!-- Categories -->
                    <h3 class="mb-2 mt-4">Service Categories</h3>
                    <div class="form-group">
                        <div class="grid grid-2">
                            <div th:each="category : ${categories}" class="form-check">
                                <input type="checkbox" class="form-check-input" th:id="'cat-' + ${category.id}"
                                    name="categoryIds" th:value="${category.id}"
                                    th:checked="${cleaner.categories.contains(category)}">
                                <label th:for="'cat-' + ${category.id}" th:text="${category.name}">Category</label>
                            </div>
                        </div>
                    </div>

                    <!-- Skills -->
                    <h3 class="mb-2 mt-4">Special Skills</h3>
                    <div class="form-group">
                        <div class="grid grid-2">
                            <div th:each="skill : ${skills}" class="form-check">
                                <input type="checkbox" class="form-check-input" th:id="'skill-' + ${skill.id}"
                                    name="skillIds" th:value="${skill.id}"
                                    th:checked="${cleaner.skills.contains(skill)}">
                                <label th:for="'skill-' + ${skill.id}" th:text="${skill.name}">Skill</label>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a th:href="@{/cleaner/dashboard}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Sweet Home. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>

</html>
