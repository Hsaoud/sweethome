<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile | Sweet Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <header class="header">
        <nav class="nav container">
            <a href="/" class="logo"><span class="logo-icon">🏠</span> Sweet Home</a>
            <ul class="nav-links">
                <li><a th:href="@{/homer/dashboard}">Dashboard</a></li>
                <li>
                    <form th:action="@{/logout}" method="post" style="display: inline;">
                        <button type="submit" class="btn btn-secondary btn-sm">Logout</button>
                    </form>
                </li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <div class="container" style="max-width: 600px;">
            <div class="card" style="padding: 2rem;">
                <h1 class="mb-3">Edit Your Profile</h1>

                <form th:action="@{/homer/profile/edit}" method="post" th:object="${homer}">
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label" for="firstName">First Name</label>
                            <input type="text" id="firstName" th:field="*{firstName}" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="lastName">Last Name</label>
                            <input type="text" id="lastName" th:field="*{lastName}" class="form-control" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="phone">Phone Number</label>
                        <input type="tel" id="phone" th:field="*{phone}" class="form-control">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="address">Address</label>
                        <input type="text" id="address" th:field="*{address}" class="form-control">
                    </div>

                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label" for="city">City</label>
                            <input type="text" id="city" th:field="*{city}" class="form-control">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="postalCode">Postal Code</label>
                            <input type="text" id="postalCode" th:field="*{postalCode}" class="form-control">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="additionalInfo">Additional Information</label>
                        <textarea id="additionalInfo" th:field="*{additionalInfo}" class="form-control" rows="3"
                            placeholder="Any additional information cleaners should know..."></textarea>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a th:href="@{/homer/dashboard}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Sweet Home. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>

</html>
