<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sweet Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <header class="header">
        <nav class="nav container">
            <a href="/" class="logo">
                <span class="logo-icon">🏠</span>
                Sweet Home
            </a>
        </nav>
    </header>

    <main class="main-content">
        <div class="auth-container">
            <div class="auth-card">
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to your account</p>

                <!-- Success message -->
                <div th:if="${param.logout}" class="alert alert-success">
                    <span>✓</span> You have been logged out successfully.
                </div>

                <!-- Success from registration -->
                <div th:if="${success}" class="alert alert-success">
                    <span>✓</span> <span th:text="${success}">Registration successful!</span>
                </div>

                <!-- Error message -->
                <div th:if="${param.error}" class="alert alert-danger">
                    <span>✗</span> Invalid email or password. Please try again.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="form-group">
                        <label class="form-label" for="username">Email Address</label>
                        <input type="email" id="username" name="username" class="form-control"
                            placeholder="Enter your email" required autofocus>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" id="password" name="password" class="form-control"
                            placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
                </form>

                <div class="mt-3 text-center">
                    <p class="text-muted">Don't have an account?</p>
                    <div class="d-flex justify-center gap-1 mt-2">
                        <a th:href="@{/register/homer}" class="btn btn-secondary btn-sm">Sign up as Homer</a>
                        <a th:href="@{/register/cleaner}" class="btn btn-secondary btn-sm">Sign up as Cleaner</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
