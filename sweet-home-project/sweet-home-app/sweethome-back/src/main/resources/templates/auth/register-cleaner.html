<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register as Cleaner | Sweet Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>
    <header class="header">
        <nav class="nav container">
            <a href="/" class="logo">
                <span class="logo-icon">🏠</span>
                Sweet Home
            </a>
        </nav>
    </header>

    <main class="main-content">
        <div class="auth-container" style="max-width: 600px;">
            <div class="auth-card">
                <h1 class="auth-title">Join as a Cleaner</h1>
                <p class="auth-subtitle">Start earning by helping people keep their homes clean</p>

                <form th:action="@{/register/cleaner}" method="post" th:object="${registration}">
                    <!-- Account Info -->
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address *</label>
                        <input type="email" id="email" th:field="*{email}" class="form-control"
                            th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                            placeholder="you@example.com" required>
                        <div th:if="${#fields.hasErrors('email')}" class="invalid-feedback" th:errors="*{email}"></div>
                    </div>

                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label" for="password">Password *</label>
                            <input type="password" id="password" th:field="*{password}" class="form-control"
                                th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                                placeholder="Min 6 characters" required>
                            <div th:if="${#fields.hasErrors('password')}" class="invalid-feedback"
                                th:errors="*{password}"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="confirmPassword">Confirm Password *</label>
                            <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                                class="form-control"
                                th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''"
                                placeholder="Repeat password" required>
                            <div th:if="${#fields.hasErrors('confirmPassword')}" class="invalid-feedback"
                                th:errors="*{confirmPassword}"></div>
                        </div>
                    </div>

                    <!-- Personal Info -->
                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label" for="firstName">First Name *</label>
                            <input type="text" id="firstName" th:field="*{firstName}" class="form-control"
                                th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid' : ''"
                                placeholder="Jane" required>
                            <div th:if="${#fields.hasErrors('firstName')}" class="invalid-feedback"
                                th:errors="*{firstName}"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="lastName">Last Name *</label>
                            <input type="text" id="lastName" th:field="*{lastName}" class="form-control"
                                th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid' : ''" placeholder="Doe"
                                required>
                            <div th:if="${#fields.hasErrors('lastName')}" class="invalid-feedback"
                                th:errors="*{lastName}"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="phone">Phone Number</label>
                        <input type="tel" id="phone" th:field="*{phone}" class="form-control"
                            placeholder="+1 234 567 890">
                    </div>

                    <!-- Professional Info -->
                    <div class="form-group">
                        <label class="form-label" for="headline">Professional Headline</label>
                        <input type="text" id="headline" th:field="*{headline}" class="form-control"
                            placeholder="e.g., Experienced House Cleaner with 5+ years">
                        <div class="form-text">A short description that appears on your profile card</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="bio">About You</label>
                        <textarea id="bio" th:field="*{bio}" class="form-control" rows="4"
                            placeholder="Tell homers about your experience, approach, and what makes you special..."></textarea>
                    </div>

                    <div class="grid grid-2">
                        <div class="form-group">
                            <label class="form-label" for="city">City</label>
                            <input type="text" id="city" th:field="*{city}" class="form-control" placeholder="New York">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="hourlyRate">Hourly Rate (€)</label>
                            <input type="number" id="hourlyRate" th:field="*{hourlyRate}" class="form-control"
                                placeholder="25" step="0.01" min="0">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="experienceYears">Years of Experience</label>
                        <input type="number" id="experienceYears" th:field="*{experienceYears}" class="form-control"
                            placeholder="3" min="0" max="50">
                    </div>

                    <!-- Categories -->
                    <div class="form-group" th:if="${categories != null && !categories.isEmpty()}">
                        <label class="form-label">Service Categories</label>
                        <div class="grid grid-2">
                            <div th:each="category : ${categories}" class="form-check">
                                <input type="checkbox" class="form-check-input" th:id="'cat-' + ${category.id}"
                                    name="categoryIds" th:value="${category.id}">
                                <label th:for="'cat-' + ${category.id}" th:text="${category.name}">Category</label>
                            </div>
                        </div>
                    </div>

                    <!-- Skills -->
                    <div class="form-group" th:if="${skills != null && !skills.isEmpty()}">
                        <label class="form-label">Special Skills</label>
                        <div class="grid grid-2">
                            <div th:each="skill : ${skills}" class="form-check">
                                <input type="checkbox" class="form-check-input" th:id="'skill-' + ${skill.id}"
                                    name="skillIds" th:value="${skill.id}">
                                <label th:for="'skill-' + ${skill.id}" th:text="${skill.name}">Skill</label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
                </form>

                <div class="mt-3 text-center">
                    <p class="text-muted">Already have an account? <a th:href="@{/login}">Sign in</a></p>
                    <p class="text-muted mt-1">Looking for a cleaner? <a th:href="@{/register/homer}">Join as Homer</a>
                    </p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
