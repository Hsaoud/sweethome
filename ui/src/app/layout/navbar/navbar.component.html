<nav class="bg-white shadow-sm sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      <div class="flex">
        <div class="flex-shrink-0 flex items-center cursor-pointer" routerLink="/">
          <span class="text-2xl mr-2">🏠</span>
          <span class="font-bold text-xl text-primary-600">Sweet Home</span>
        </div>
        <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
          <a routerLink="/cleaners" routerLinkActive="text-primary-600 border-primary-500" 
             class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
            Find Cleaners
          </a>
        </div>
      </div>
      <div class="hidden sm:ml-6 sm:flex sm:items-center">
        @if (authService.currentUser()) {
          <div class="relative ml-3 flex items-center space-x-4">
             <span class="text-sm font-medium text-gray-700">Hello, {{ authService.currentUser()?.firstName }}</span>
             
             @if (authService.currentUser()?.role === 'HOMER') {
                <a routerLink="/dashboard/homer" class="text-sm text-gray-500 hover:text-gray-900">Dashboard</a>
             }
             @if (authService.currentUser()?.role === 'CLEANER') {
                <a routerLink="/dashboard/cleaner" class="text-sm text-gray-500 hover:text-gray-900">Dashboard</a>
             }

             <button (click)="authService.logout()" 
                     class="bg-white p-1 rounded-full text-gray-400 hover:text-gray-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500">
               <span class="text-sm font-medium text-red-500">Logout</span>
             </button>
          </div>
        } @else {
          <div class="flex space-x-4">
            <a routerLink="/login" class="text-gray-500 hover:text-gray-900 px-3 py-2 rounded-md text-sm font-medium">Login</a>
            <a routerLink="/register/homer" class="bg-primary-600 text-white hover:bg-primary-700 px-3 py-2 rounded-md text-sm font-medium">Sign Up</a>
          </div>
        }
      </div>
    </div>
  </div>
</nav>
